<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODUCT DETAIL | AURA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #F5F5F0; cursor: none; }
        .brand-font { font-family: 'Syne', sans-serif; }
        
        #cursor {
            position: fixed; width: 20px; height: 20px; border: 1px solid #000;
            border-radius: 50%; pointer-events: none; z-index: 9999;
            mix-blend-mode: difference; background: white;
        }

        .grain {
            position: fixed; inset: 0; pointer-events: none; z-index: 9000; opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200'...");
        }

        .img-zoom-container { overflow: hidden; border-radius: 2rem; background: #fff; }
        .img-zoom-container img { transition: transform 0.5s ease; }
        .img-zoom-container:hover img { transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="grain"></div>

    <nav class="p-8 flex justify-between items-center relative z-50">
        <a href="index.html" class="text-2xl font-black brand-font hover-trigger">AURA.</a>
        <button onclick="history.back()" class="text-xs font-bold uppercase tracking-widest hover-trigger flex items-center gap-2">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
        </button>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-12 grid grid-cols-1 lg:grid-cols-2 gap-16">
        <div class="img-zoom-container aspect-[4/5] shadow-2xl">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200" 
                 id="main-img" class="w-full h-full object-contain p-12">
        </div>

        <div class="flex flex-col justify-center">
            <span class="text-gray-400 font-bold tracking-[0.3em] uppercase text-xs mb-4">Limited Archive</span>
            <h1 class="text-6xl font-black brand-font uppercase mb-2 tracking-tighter" id="prod-name">Onyx Chrono</h1>
            <p class="text-2xl font-bold mb-8" id="prod-price">$580.00</p>
            
            <div class="border-t border-black/10 pt-8 space-y-8">
                <div>
                    <h4 class="text-[10px] font-black uppercase tracking-widest mb-4">Select Finish</h4>
                    <div class="flex gap-4">
                        <button class="w-12 h-12 rounded-full border-2 border-black bg-[#1a1a1a] hover-trigger"></button>
                        <button class="w-12 h-12 rounded-full border border-black/20 bg-[#d1d1d1] hover-trigger"></button>
                    </div>
                </div>

                <div>
                    <h4 class="text-[10px] font-black uppercase tracking-widest mb-4">Description</h4>
                    <p class="text-gray-500 leading-relaxed max-w-md">
                        The Onyx Chronograph 01 features a titanium-brushed casing with sapphire crystal glass. Engineered for precision and minimal aesthetic impact.
                    </p>
                </div>

                <div class="pt-8 flex gap-4">
                    <button onclick="placeOrder()" id="order-btn" 
                            class="flex-grow bg-black text-white py-5 rounded-2xl font-black uppercase tracking-widest text-sm hover:scale-[1.02] transition hover-trigger">
                        Place Order
                    </button>
                    <button class="p-5 border border-black/10 rounded-2xl hover:bg-black hover:text-white transition hover-trigger">
                        <i data-lucide="heart" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // Place Order Backend Simulation
        function placeOrder() {
            const btn = document.getElementById('order-btn');
            const name = document.getElementById('prod-name').innerText;
            const price = document.getElementById('prod-price').innerText;

            // 1. Visual Feedback
            btn.innerText = "Processing...";
            btn.disabled = true;

            // 2. Mocking a Backend API Call
            setTimeout(() => {
                const orderData = {
                    orderID: "AUR-" + Math.floor(Math.random() * 1000000),
                    item: name,
                    amount: price,
                    date: new Date().toISOString()
                };

                // Store in LocalStorage (Frontend "Database")
                const orders = JSON.parse(localStorage.getItem('aura_orders') || "[]");
                orders.push(orderData);
                localStorage.setItem('aura_orders', JSON.stringify(orders));

                // 3. Success State
                btn.innerText = "Order Confirmed";
                btn.classList.remove('bg-black');
                btn.classList.add('bg-green-600');
                
                alert(`Order Success! ID: ${orderData.orderID}`);
            }, 1500);
        }

        // Cursor Logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });
        document.querySelectorAll('.hover-trigger').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.style.transform = 'translate(-50%, -50%) scale(3)');
            el.addEventListener('mouseleave', () => cursor.style.transform = 'translate(-50%, -50%) scale(1)');
        });
    </script>
</body>
</html>
